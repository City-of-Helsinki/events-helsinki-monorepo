name: CI-packages

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.prettier*'
      - 'tsconfig.base.json'
      - '.github/workflows/ci-packages.yml'

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.prettier*'
      - 'tsconfig.base.json'
      - '.github/workflows/ci-packages.yml'

env:
  CI: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ requires Node >=22.13; setup Node before pnpm/action-setup
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Cache pnpm store
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Restore packages cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache
            ${{ github.workspace }}/**/tsconfig.tsbuildinfo
          key: ${{ runner.os }}-packages-cache-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('packages/**.[jt]sx?', 'packages/**.json') }}
          restore-keys: |
            ${{ runner.os }}-packages-cache-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Typecheck
        run: pnpm --filter '@events-helsinki/*' --filter '...[origin/main]' run typecheck

      - name: Linter
        run: |
          pnpm --filter '@events-helsinki/*' --filter '...[origin/main]' run lint
          pnpm --filter '@events-helsinki/*' --filter '...[origin/main]' --if-present run lint-styles

      - name: Unit tests changed packages
        run: pnpm --filter '@events-helsinki/*' --filter '...[origin/main]' run test --coverage

      - name: Run build for changed packages
        run: pnpm --filter '@events-helsinki/*' --filter '...[origin/main]' run build

      - name: Run storybook build for changed packages
        run: pnpm --filter '...[origin/main]' --filter '!./apps/*' run build-storybook

      - name: Run tests
        working-directory: packages/components
        run: pnpm test:coverage
        env:
          CI: true

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: packages/components
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
