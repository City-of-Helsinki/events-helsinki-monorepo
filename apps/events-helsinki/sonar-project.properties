# Base SonarQube configuration for City of Helsinki Frontend projects
sonar.projectKey = City-of-Helsinki_tapahtumat-ui
sonar.organization=city-of-helsinki
sonar.javascript.lcov.reportPaths=./coverage/lcov.info
sonar.sourceEncoding=UTF-8
sonar.sources=src
sonar.exclusions= \
  **/__mocks__/**/*, \
  **/__snapshots__/*, \
  **/*.d.ts, \
  src/i18n.ts, \
  src/logger.ts

sonar.test.inclusions= \
  **/__tests__/**/*, \
  **/*.test.js, \
  **/*.test.ts, \
  **/*.test.jsx, \
  **/*.test.tsx

sonar.coverage.exclusions= \
  src/pages/**/*.tsx, \
  src/pages/api/healthz.ts, \
  src/pages/api/readiness.ts, \
  src/lib/**
