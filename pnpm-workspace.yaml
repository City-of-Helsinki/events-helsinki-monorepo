packages:
  - 'apps/*'
  - 'packages/*'
  - 'proxies/*'

# Only install package versions published at least 7 days ago (City of Helsinki org default)
minimumReleaseAge: 10080
# Security/dependabot bumps that lag behind the 7-day gate (see main yarn.lock)
minimumReleaseAgeExclude:
  - js-yaml@4.3.0
  - '@opentelemetry/core@2.8.0'
  - '@opentelemetry/sdk-trace-base@2.8.0'
  - '@opentelemetry/resources@2.8.0'

# Moved from package.json (pnpm 11.5+ reads overrides here only)
overrides:
  '@babel/core': ^7.29.6
  '@babel/runtime': ^7.28.4
  '@testing-library/dom': ^10.4.0
  '@tootallnate/once': ^3.0.1
  '@types/node': 24.13.2
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  cookie: 0.7.2
  eslint: 9.39.4
  form-data: ^4.0.4
  get-func-name: 2.0.2
  immutable@~3.7.6: ^3.8.3
  jose: 4.15.9
  lodash: 4.18.1
  minimatch@9.0.3: ^9.0.6
  minimatch@10.1.2: ^10.2.3
  path-to-regexp: ^8.4.0
  qs: 6.15.2
  react: 19.2.7
  react-dom: 19.2.7
  rollup@4.35.0: ^4.59.0
  serialize-javascript: ^7.0.5
  socks: ^2.8.6
  svgo@^3.0.2: ^4.0.1
  tar: '>=7.5.4'
  tmp: 0.2.7
  underscore: '>=1.13.8'
  typescript: 5.8.3
  ws: ^8.21.0
  js-yaml: 4.3.0
  i18next-fs-backend: 2.6.6
  '@opentelemetry/core': ^2.8.0
  '@opentelemetry/sdk-trace-base': ^2.8.0
  '@opentelemetry/resources': ^2.8.0
  'yaml@^2.0.0': ^2.8.3
  postcss: ^8.5.10
  'brace-expansion@5.0.5': 5.0.6
  'uuid@11.1.0': 11.1.1
  'uuid@^9.0.0': 11.1.1
  diff: 4.0.4
  esbuild: 0.28.1

allowBuilds:
  '@apollo/protobufjs': true
  '@ffmpeg-installer/darwin-arm64': true
  '@ffmpeg-installer/linux-arm64': true
  '@ffmpeg-installer/linux-x64': true
  '@parcel/watcher': true
  '@sentry/cli': true
  core-js: true
  core-js-pure: true
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
